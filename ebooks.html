<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVOgift — Mis Ebooks</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ... (mismos estilos que ya tenías) ... */
*{margin:0;padding:0;box-sizing:border-box}
:root{ --bg:#080808;--bg2:#0e0e0e;--bg3:#161616;--lime:#e8ff47;--text:#f0ede8;--text2:#a09e99;--r:14px;--rs:8px;--fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(24px);background:rgba(8,8,8,.85);border-bottom:1px solid #ffffff08}
.logo{display:flex;align-items:center;font-family:var(--fd);font-size:21px;font-weight:800;text-decoration:none;color:var(--text)}
.logo-gift{color:var(--lime);font-weight:300}
.main{padding:100px 20px 60px;max-width:1100px;margin:0 auto}
.page-title{font-family:var(--fd);font-size:32px;text-align:center;margin-bottom:40px}
.ebooks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.ebook-card{background:var(--bg3);border:1px solid #ffffff10;border-radius:var(--r);overflow:hidden;transition:.2s}
.ebook-card .cover{width:100%;aspect-ratio:3/4;background:#1e1e1e;overflow:hidden;cursor:pointer}
.ebook-card .cover img{width:100%;height:100%;object-fit:cover}
.ebook-card .info{padding:16px}
.ebook-card .title{font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:12px}
.btn{width:100%;padding:10px;border-radius:var(--rs);font-family:var(--fd);font-weight:700;cursor:pointer;border:none}
.btn-pdf{background:var(--lime);color:var(--bg)}
.error-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ff4444;color:#fff;padding:12px 24px;border-radius:var(--rs);display:none}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="logo">VIVO<span class="logo-gift">gift</span></a>
  <div class="nav-links"><a href="/ebooks.html" style="color:var(--lime)">Mis Ebooks</a></div>
</nav>

<main class="main">
  <h1 class="page-title">📚 Mis Ebooks</h1>
  <div id="loading" style="text-align:center">Cargando biblioteca...</div>
  <div id="ebooksGrid" class="ebooks-grid"></div>
</main>

<div class="error-toast" id="errorToast"></div>

<script>
// CONFIGURACIÓN DE TU SUPABASE
const SUPABASE_URL = 'https://rtjgcpklpyolzsdjjtdb.supabase.co';
const SUPABASE_KEY = 'TU_ANON_KEY_AQUI'; // <--- PEGA TU ANON KEY AQUÍ

async function loadEbooks() {
  const grid = document.getElementById('ebooksGrid');
  const loading = document.getElementById('loading');
  
  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/ebooks?select=*&order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    
    const ebooks = await response.json();
    loading.style.display = 'none';
    
    if (ebooks.length === 0) {
      grid.innerHTML = '<p style="text-align:center;grid-column:1/-1">No hay libros generados aún.</p>';
      return;
    }

    grid.innerHTML = '';
    ebooks.forEach((ebook) => {
      const card = document.createElement('div');
      card.className = 'ebook-card';
      card.innerHTML = `
        <div class="cover"><img src="${ebook.cover_url}" onerror="this.src='https://via.placeholder.com/300x400?text=Error+Imagen'"></div>
        <div class="info">
          <div class="title">${ebook.title}</div>
          <button class="btn btn-pdf" onclick='downloadPdf(${JSON.stringify(ebook.images)}, this)'>📄 Descargar PDF</button>
        </div>
      `;
      grid.appendChild(card);
    });
  } catch (err) {
    loading.textContent = 'Error al conectar con la base de datos.';
  }
}

async function downloadPdf(images, btn) {
  if (!images || images.length === 0) return;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Preparando...';

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    
    for (let i = 0; i < images.length; i++) {
      btn.innerHTML = `⏳ Página ${i+1}/${images.length}`;
      if (i > 0) pdf.addPage();
      
      const response = await fetch(images[i].url);
      const blob = await response.blob();
      const dataUrl = await new Promise(r => {
        const reader = new FileReader();
        reader.onloadend = () => r(reader.result);
        reader.readAsDataURL(blob);
      });
      pdf.addImage(dataUrl, 'JPEG', 0, 0, 210, 297);
    }
    pdf.save('mi_ebook_vivogift.pdf');
    btn.innerHTML = '✅ ¡Listo!';
  } catch (e) {
    alert('Error al generar PDF. Intenta de nuevo.');
  } finally {
    setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 3000);
  }
}

loadEbooks();
</script>
</body>
</html>
