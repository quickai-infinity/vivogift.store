<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVOgift — Mis Ebooks</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080808;--bg2:#0e0e0e;--bg3:#161616;--bg4:#1e1e1e;--bg5:#262626;
  --lime:#e8ff47;--lime10:#e8ff4718;--lime20:#e8ff4730;
  --text:#f0ede8;--text2:#a09e99;--text3:#5a5a5a;
  --r:14px;--rs:8px;
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(24px);background:rgba(8,8,8,.85);border-bottom:1px solid #ffffff08}
.logo{display:flex;align-items:center;font-family:var(--fd);font-size:21px;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--text)}
.logo-o{width:24px;height:24px;border:2px solid var(--lime);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin:0 1px}
.logo-o svg{width:9px;height:9px;fill:var(--lime)}
.logo-gift{color:var(--lime);font-weight:300;font-size:19px}
.nav-links{display:flex;gap:20px;align-items:center}
.nav-links a{color:var(--text2);text-decoration:none;font-size:13px;transition:.2s}
.nav-links a:hover{color:var(--lime)}
.nav-links a.active{color:var(--lime)}

.main{padding:100px 20px 60px;max-width:1100px;margin:0 auto}
.page-title{font-family:var(--fd);font-size:32px;font-weight:800;margin-bottom:8px;text-align:center}
.page-sub{color:var(--text2);font-size:14px;text-align:center;margin-bottom:40px}

.loading-state{text-align:center;padding:60px 20px}
.loading-state .spinner{width:40px;height:40px;border:3px solid var(--bg4);border-top-color:var(--lime);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state p{color:var(--text2);font-size:14px}

.empty-state{text-align:center;padding:60px 20px}
.empty-state .icon{font-size:64px;margin-bottom:16px}
.empty-state h3{font-family:var(--fd);font-size:20px;margin-bottom:8px}
.empty-state p{color:var(--text2);font-size:14px;margin-bottom:24px}

.ebooks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
@media(max-width:600px){.ebooks-grid{grid-template-columns:1fr}}

.ebook-card{background:var(--bg3);border:1px solid #ffffff10;border-radius:var(--r);overflow:hidden;transition:.2s}
.ebook-card:hover{border-color:#ffffff25;transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.ebook-card .cover{width:100%;aspect-ratio:3/4;background:var(--bg4);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.ebook-card .cover img{width:100%;height:100%;object-fit:cover}
.ebook-card .cover .placeholder{color:var(--text3);font-size:48px}
.ebook-card .page-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);color:var(--lime);font-family:var(--fd);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;backdrop-filter:blur(8px)}
.ebook-card .info{padding:16px}
.ebook-card .title{font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:4px;text-transform:capitalize}
.ebook-card .date{color:var(--text3);font-size:11px;margin-bottom:12px}
.ebook-card .actions{display:flex;gap:8px}
.ebook-card .btn{flex:1;padding:10px 12px;border-radius:var(--rs);font-family:var(--fd);font-size:11px;font-weight:700;cursor:pointer;transition:.2s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-pdf{background:var(--lime);border:none;color:var(--bg)}
.btn-pdf:hover{box-shadow:0 4px 16px #e8ff4730}
.btn-pdf:disabled{opacity:.5;cursor:wait}
.btn-drive{background:transparent;border:1px solid #ffffff20;color:var(--text2)}
.btn-drive:hover{border-color:var(--lime);color:var(--lime)}

.btn-create{display:block;width:fit-content;margin:40px auto 0;padding:16px 40px;background:var(--lime);color:var(--bg);font-family:var(--fd);font-size:15px;font-weight:800;border:none;border-radius:var(--rs);cursor:pointer;text-decoration:none;text-transform:uppercase;letter-spacing:.5px;transition:.2s}
.btn-create:hover{box-shadow:0 8px 30px #e8ff4725;transform:translateY(-2px)}

.error-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ff4444;color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:13px;z-index:999;display:none;max-width:90%}

.zoom-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:200;display:none;align-items:center;justify-content:center;cursor:zoom-out;padding:20px}
.zoom-overlay.active{display:flex}
.zoom-overlay img{max-width:95%;max-height:95%;object-fit:contain;border-radius:8px}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="logo">
    VIV<span class="logo-o"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/></svg></span><span class="logo-gift">gift</span>
  </a>
  <div class="nav-links">
    <a href="/">Inicio</a>
    <a href="/ebooks.html" class="active">Mis Ebooks</a>
    <a href="/generador-ebooks.html">Crear Ebook</a>
  </div>
</nav>

<main class="main">
  <h1 class="page-title">📚 Mis Ebooks</h1>
  <p class="page-sub">Todos tus libros ilustrados creados con VIVOgift</p>

  <div id="loadingState" class="loading-state">
    <div class="spinner"></div>
    <p>Cargando tus ebooks desde Google Drive...</p>
  </div>

  <div id="emptyState" class="empty-state" style="display:none">
    <div class="icon">📖</div>
    <h3>Aún no tienes ebooks</h3>
    <p>Crea tu primer libro ilustrado con inteligencia artificial</p>
    <a href="/generador-ebooks.html" class="btn-create" style="margin-top:16px">✨ Crear mi primer Ebook</a>
  </div>

  <div id="ebooksGrid" class="ebooks-grid" style="display:none"></div>

  <a href="/generador-ebooks.html" class="btn-create" id="btnCreateNew" style="display:none">✨ Crear nuevo Ebook</a>
</main>

<div class="zoom-overlay" id="zoomOverlay" onclick="this.classList.remove('active')">
  <img id="zoomImage" src="" alt="Vista ampliada">
</div>
<div class="error-toast" id="errorToast"></div>

<script>
const FOLDER_ID = '1ZQiirhfLa4usDPGnzA9OBrtckcn3kSm0';
const API_KEY = 'AIzaSyBkfSAqZljwjwtxSqz4K3-CnhGIx_2xp3I';

function showError(msg) {
  const t = document.getElementById('errorToast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 5000);
}

async function loadEbooks() {
  try {
    // Buscar todas las imágenes en la carpeta de Drive
    const resp = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'image'&fields=files(id,name,createdTime,mimeType)&orderBy=createdTime+desc&pageSize=500&key=${API_KEY}`
    );

    if (!resp.ok) throw new Error('Error al acceder a Google Drive');
    const data = await resp.json();
    const files = data.files || [];

    if (files.length === 0) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    // Agrupar por nombre de ebook (todo antes de _pagina_)
    const ebooks = {};
    for (const file of files) {
      const match = file.name.match(/^(.+?)_pagina_(\d+)\./i);
      if (match) {
        const bookName = match[1].replace(/_/g, ' ');
        const pageNum = parseInt(match[2]);
        if (!ebooks[bookName]) {
          ebooks[bookName] = {
            name: bookName,
            pages: [],
            createdTime: file.createdTime
          };
        }
        ebooks[bookName].pages.push({
          id: file.id,
          pageNumber: pageNum,
          name: file.name
        });
      }
    }

    // Ordenar páginas dentro de cada ebook
    for (const key of Object.keys(ebooks)) {
      ebooks[key].pages.sort((a, b) => a.pageNumber - b.pageNumber);
    }

    const ebookList = Object.values(ebooks).sort(
      (a, b) => new Date(b.createdTime) - new Date(a.createdTime)
    );

    if (ebookList.length === 0) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    renderEbooks(ebookList);
  } catch (err) {
    console.error('Error cargando ebooks:', err);
    document.getElementById('loadingState').style.display = 'none';
    showError('No se pudieron cargar los ebooks. Revisa la conexión.');
    // Mostrar enlace directo a Drive como fallback
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('emptyState').innerHTML = `
      <div class="icon">⚠️</div>
      <h3>No se pudo conectar con Google Drive</h3>
      <p>Puedes acceder directamente a tu carpeta de ebooks:</p>
      <a href="https://drive.google.com/drive/folders/${FOLDER_ID}" target="_blank" class="btn-create" style="margin-top:16px;font-size:13px">📁 Abrir en Google Drive</a>
    `;
  }
}

function renderEbooks(ebooks) {
  const grid = document.getElementById('ebooksGrid');
  grid.innerHTML = '';

  for (const ebook of ebooks) {
    const firstPage = ebook.pages[0];
    const thumbUrl = `https://drive.google.com/thumbnail?id=${firstPage.id}&sz=w400`;
    const date = new Date(ebook.createdTime).toLocaleDateString('es-ES', {
      day: 'numeric', month: 'short', year: 'numeric'
    });

    const card = document.createElement('div');
    card.className = 'ebook-card';
    card.innerHTML = `
      <div class="cover" onclick="zoomImage('${firstPage.id}')">
        <img src="${thumbUrl}" alt="${ebook.name}" loading="lazy" onerror="this.style.display='none';this.parentElement.querySelector('.placeholder').style.display='block'">
        <div class="placeholder" style="display:none">📖</div>
        <div class="page-count">${ebook.pages.length} págs</div>
      </div>
      <div class="info">
        <div class="title">${ebook.name}</div>
        <div class="date">${date}</div>
        <div class="actions">
          <button class="btn btn-pdf" onclick="downloadPdf('${ebook.name}', this)" data-pages='${JSON.stringify(ebook.pages.map(p => p.id))}'>
            📄 Descargar PDF
          </button>
          <a class="btn btn-drive" href="https://drive.google.com/drive/folders/${FOLDER_ID}" target="_blank">
            📁 Drive
          </a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  }

  document.getElementById('loadingState').style.display = 'none';
  grid.style.display = 'grid';
  document.getElementById('btnCreateNew').style.display = 'block';
}

function zoomImage(imageId) {
  const url = `https://drive.google.com/thumbnail?id=${imageId}&sz=w1200`;
  document.getElementById('zoomImage').src = url;
  document.getElementById('zoomOverlay').classList.add('active');
}

async function downloadPdf(bookName, btn) {
  const pageIds = JSON.parse(btn.getAttribute('data-pages'));
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ 0/' + pageIds.length;

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pw = 210, ph = 297;

    for (let i = 0; i < pageIds.length; i++) {
      btn.innerHTML = '⏳ ' + (i + 1) + '/' + pageIds.length;
      if (i > 0) pdf.addPage();

      try {
        const url = 'https://drive.google.com/thumbnail?id=' + pageIds[i] + '&sz=w1600';

        const dataUrl = await new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL('image/jpeg', 0.95));
          };
          img.onerror = () => reject(new Error('Imagen ' + (i + 1)));
          img.src = url;
          setTimeout(() => reject(new Error('Timeout')), 20000);
        });

        pdf.addImage(dataUrl, 'JPEG', 0, 0, pw, ph);
      } catch (e) {
        console.warn('Página ' + (i + 1) + ' falló:', e.message);
        pdf.setFontSize(14);
        pdf.text('Página ' + (i + 1) + ' no disponible', 20, 140);
      }
    }

    pdf.save(bookName.replace(/\s+/g, '_') + '.pdf');
    btn.innerHTML = '✅ ¡Listo!';
    setTimeout(() => { btn.innerHTML = originalText; btn.disabled = false; }, 3000);
  } catch (err) {
    console.error('Error generando PDF:', err);
    showError('Error al generar el PDF.');
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

// Cargar al abrir
loadEbooks();
</script>

</body>
</html>
